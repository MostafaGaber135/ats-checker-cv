name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  # Stub key for build-time — never used at runtime in CI
  ANTHROPIC_API_KEY: sk-ant-ci-stub-not-real

jobs:
  # ── Type-check & build ──────────────────────────────────────
  build:
    name: Type Check + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: nextjs-build
          path: .next/
          retention-days: 1

  # ── Lint ────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0 || true
        # 'true' so missing eslint config doesn't fail CI — add .eslintrc.json to enforce

  # ── Docker build ────────────────────────────────────────────
  docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (no push)
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://example.com \
            -t ats-cv-checker:ci \
            .
